name: Build and Deploy SPA to CouchDB

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & Build React
        run: |
          npm ci
          npm run build

      # If your build output folder is NOT "build", change this env to your real output folder:
      # - CRA: build
      # - Vite: dist
      # - Next export: out
      - name: Deploy SPA to CouchDB
        env:
          COUCH_URL: ${{ secrets.COUCH_URL }}
          COUCH_DB: ui
          COUCH_USER: ${{ secrets.COUCH_USER }}
          COUCH_PASS: ${{ secrets.COUCH_PASS }}
          COUCH_DDOC: app
          BUILD_DIR: dist
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const COUCH_URL = process.env.COUCH_URL.replace(/\/+$/, "");
          const COUCH_DB = process.env.COUCH_DB;
          const COUCH_USER = process.env.COUCH_USER;
          const COUCH_PASS = process.env.COUCH_PASS;
          const COUCH_DDOC = process.env.COUCH_DDOC || "app";
          const BUILD_DIR = process.env.BUILD_DIR || "dist";

          const mime = (p) => {
            const ext = path.extname(p).toLowerCase();
            return ({
              ".html": "text/html; charset=utf-8",
              ".js": "application/javascript; charset=utf-8",
              ".css": "text/css; charset=utf-8",
              ".json": "application/json; charset=utf-8",
              ".svg": "image/svg+xml",
              ".png": "image/png",
              ".jpg": "image/jpeg",
              ".jpeg": "image/jpeg",
              ".webp": "image/webp",
              ".ico": "image/x-icon",
              ".map": "application/json; charset=utf-8",
              ".woff": "font/woff",
              ".woff2": "font/woff2",
              ".ttf": "font/ttf"
            })[ext] || "application/octet-stream";
          };

          const walk = (dir) => {
            const out = [];
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) out.push(...walk(full));
              else out.push(full);
            }
            return out;
          };

          const authHeader = "Basic " + Buffer.from(`${COUCH_USER}:${COUCH_PASS}`).toString("base64");

          async function request(method, urlPath, body) {
            const res = await fetch(`${COUCH_URL}/${urlPath.replace(/^\/+/, "")}`, {
              method,
              headers: {
                Authorization: authHeader,
                "Content-Type": "application/json",
                Accept: "application/json"
              },
              body: body ? JSON.stringify(body) : undefined
            });
            const text = await res.text();
            let json;
            try { json = JSON.parse(text); } catch { json = { raw: text }; }
            if (!res.ok && !(res.status === 404 && method === "GET")) {
              throw new Error(`${method} ${urlPath} -> ${res.status}: ${text}`);
            }
            return json;
          }

          (async () => {
            let rev;
            try {
              const existing = await request("GET", `/${COUCH_DB}/_design/${COUCH_DDOC}`);
              rev = existing._rev;
            } catch {}

            const attachments = {};
            for (const file of walk(BUILD_DIR)) {
              const rel = path.relative(BUILD_DIR, file).replace(/\\/g, "/");
              attachments[rel] = {
                content_type: mime(file),
                data: fs.readFileSync(file).toString("base64")
              };
            }

            if (!attachments["index.html"]) {
              throw new Error(`index.html not found in ${BUILD_DIR}`);
            }

            const doc = {
              _id: `_design/${COUCH_DDOC}`,
              ...(rev ? { _rev: rev } : {}),
              rewrites: [
                { from: "/", to: "index.html" },
                { from: "/assets/*", to: "assets/*" },
                { from: "/*", to: "index.html" }
              ],
              _attachments: attachments
            };

            const result = await request("PUT", `/${COUCH_DB}/_design/${COUCH_DDOC}`, doc);
            console.log(result);
          })().catch(err => {
            console.error(err);
            process.exit(1);
          });
          NODE
